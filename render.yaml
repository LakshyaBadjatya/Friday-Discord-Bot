# ⚠️ This service uses Docker runtime on Render, NOT native Node.
# The `buildCommand`/`startCommand` are ignored — edit Dockerfile instead.
# Actual service name on Render: Friday-Discord-Bot
# URL: https://friday-discord-bot-9u7u.onrender.com
services:
  - type: web
    name: friday-discord-bot
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    repo: https://github.com/LakshyaBadjatya/Friday-Discord-Bot
    region: singapore
    plan: free
    branch: main
    autoDeploy: yes
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: NVIDIA_API_KEY
        sync: false
      - key: FIREBASE_API_KEY
        sync: false
      - key: FIREBASE_AUTH_DOMAIN
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: FIREBASE_APP_ID
        sync: false
      - key: FIREBASE_MEASUREMENT_ID
        sync: false
      - key: RENDER_API_KEY
        sync: false
